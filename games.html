        <title>ZOCMYT - Games</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                background-image: url("https://raw.githubusercontent.com/VRGamer262Real/Hub-Cloudflare/refs/heads/main/bg.jpg");
                background-size: cover;
                background-attachment: fixed;
                color: white;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
            }

            /* Navigation */
            .nav {
                list-style-type: none;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: rgba(42, 51, 46, 0.85);
                backdrop-filter: blur(5px);
            }

            .nav li { float: left; }

            .nav li a {
                display: block;
                color: whitesmoke;
                text-decoration: none;
                padding: 14px 16px;
                text-align: center;
                transition: 0.3s;
            }

            .nav li a:hover {
                background-color: white;
                color: black;
            }

            h1 {
                text-align: center;
                margin-top: 40px;
                font-size: 3rem;
                opacity: 0;
                animation: fadeIn 1s forwards;
            }

            /* Games Grid */
            .listItem {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
                padding: 40px;
                list-style-type: none;
                opacity: 0;
                animation: fadeIn 1.5s 0.5s forwards;
            }

            .listItem li {
                width: 220px;
            }

            .listItem a {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: white;
                background: rgba(20, 25, 23, 0.8);
                padding: 15px;
                border-radius: 15px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                text-align: center;
                height: 100%;
            }

            /* The Image inside the button */
            .listItem img {
                width: 100%;
                height: 130px;
                object-fit: cover;
                border-radius: 10px;
                margin-bottom: 12px;
                transition: transform 0.4s;
            }

            /* Cool Animation Effects */
            .listItem a:hover {
                transform: translateY(-15px) scale(1.05);
                background: rgba(255, 255, 255, 0.15);
                border-color: #00d2ff;
                box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4);
            }

            /* Special glow for Hacked versions */
            .listItem a.hacked:hover {
                border-color: #ff4b2b;
                box-shadow: 0 15px 30px rgba(255, 75, 43, 0.4);
            }

            .listItem a:hover img {
                transform: scale(1.1) rotate(2deg);
            }

            .game-title {
                font-weight: bold;
                font-size: 1rem;
                margin-top: 5px;
            }

            @keyframes fadeIn {
                to { opacity: 1; transform: translateY(0); }
                from { opacity: 0; transform: translateY(20px); }
            }
        </style>
    </head>
