                animation: fadeIn 1.5s 0.5s forwards; /* Applied fadeIn animation with delay */

            .listItem li {
                width: 220px; /* Fixed width for list items */

            .listItem a {

                text-align: center;
                height: 100%; /* Ensure full height */
            }

            /* Cool Animation Effects */
            .listItem a:hover {
                transform: translateY(-15px) scale(1.05); /* Hover effect */
                background: rgba(255, 255, 255, 0.15); /* Lighter background on hover */
                border-color: #00d2ff; /* Cyan border on hover */
                box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4); /* Glow effect */

            .game-title { /* Renamed from game-title to be more general */
                font-weight: bold;
                font-size: 1rem;
                margin-top: 5px;
            }

            @keyframes fadeIn {
                to { opacity: 1; transform: translateY(0); }
                from { opacity: 0; transform: translateY(20px); }
