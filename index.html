    .nav {
        list-style-type: none;
        margin: 20px auto;
        padding: 5px 15px;
        display: flex;
        justify-content: center;
        width: fit-content;
        background: rgba(42, 51, 46, 0.75);
        backdrop-filter: blur(10px);
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        position: sticky;
        top: 20px;
        z-index: 1000;
        animation: fadeIn 1s ease-out;
    }

    .nav li a {
        display: block;
        color: whitesmoke;
        text-decoration: none;
        padding: 10px 20px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 30px;
    }

    .nav li a:hover {
        background-color: rgba(255, 255, 255, 0.15);

        transform: scale(1.1);
    }

            h1 {

            .listItem {
                display: flex; /* Using flexbox for layout */
                flex-wrap: wrap; /* Allow items to wrap */
                justify-content: center; /* Center items horizontally */
                gap: 25px; /* Spacing between items */
                padding: 40px; /* Padding around the list */
                list-style-type: none;
                opacity: 0;
                animation: fadeIn 1.5s 0.5s forwards; /* Applied fadeIn animation with delay */

            .listItem li {

            .listItem a {
                display: flex;
                flex-direction: column; /* Stack content vertically */
                align-items: center; /* Center content horizontally */
                text-decoration: none;
                color: white;
                background: rgba(42, 51, 46, 0.75); /* Kept original background */
                padding: 15px; /* Adjusted padding */
                border-radius: 15px; /* Rounded corners */
                border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Enhanced transition */
